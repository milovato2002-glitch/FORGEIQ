<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGEIQ — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0a1628;color:#e8edf5;font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}

.onboarding-orb{position:fixed;top:-80px;left:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(240,165,0,0.2) 0%,rgba(45,212,191,0.1) 50%,transparent 70%);animation:orbPulse 4s ease-in-out infinite;pointer-events:none;z-index:0;}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:0.5;}50%{transform:scale(1.3);opacity:1;}}
.ob-header{padding:16px 20px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;}
.ob-wordmark{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.2em;color:rgba(255,255,255,0.3);}
.ob-progress-bar{width:100%;max-width:400px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;}
.ob-progress-fill{height:100%;background:#f0a500;border-radius:2px;transition:width 0.5s;width:0%;}

/* Messages */
.ob-messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;}
.msg-ai{display:flex;align-items:flex-start;gap:10px;animation:fadeUp 0.3s ease;}
.msg-ai-bubble{background:#142444;border-left:3px solid #f0a500;border-radius:4px 12px 12px 4px;padding:14px 16px;max-width:85%;color:#e8edf5;font-size:16px;line-height:1.5;}
.msg-user{display:flex;justify-content:flex-end;animation:fadeUp 0.3s ease;}
.msg-user-bubble{background:#f0a500;border-radius:12px 4px 4px 12px;padding:12px 16px;max-width:75%;color:#0a1628;font-size:16px;font-weight:600;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Quick replies */
.ob-qr{padding:8px 16px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;z-index:1;}
.ob-qr::-webkit-scrollbar{display:none;}
.qr-pill{flex-shrink:0;padding:10px 18px;border-radius:24px;border:1px solid rgba(240,165,0,0.5);background:rgba(240,165,0,0.08);color:#f0a500;font-size:14px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.qr-pill:hover,.qr-pill:active{background:#f0a500;color:#0a1628;}

/* Input bar */
.ob-input-bar{padding:12px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid rgba(255,255,255,0.08);background:#0a1628;z-index:1;}
#ob-input{flex:1;height:44px;background:#142444;border:1px solid rgba(255,255,255,0.15);border-radius:22px;padding:0 16px;color:#e8edf5;font-size:16px;outline:none;font-family:'Barlow',sans-serif;}
#ob-input:focus{border-color:#f0a500;}
#ob-send{width:44px;height:44px;border-radius:50%;background:#f0a500;border:none;color:#0a1628;font-size:18px;cursor:pointer;}
#ob-mic{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#8fa3c0;font-size:18px;cursor:pointer;}

/* Phase 2 checklist */
.cl-pill{padding:10px 16px;border-radius:24px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#8fa3c0;font-size:13px;cursor:pointer;transition:all 0.15s;font-family:'Barlow',sans-serif;}
.cl-pill:hover{border-color:rgba(240,165,0,0.4);color:#e8edf5;}
.cl-pill.selected{background:rgba(240,165,0,0.15);border-color:#f0a500;color:#f0a500;font-weight:600;}
.cl-pill-num{width:52px;height:52px;border-radius:50%;padding:0;display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;}
.cl-section{margin-bottom:20px;}
.cl-label{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#4a6080;margin-bottom:8px;}
</style>
</head>
<body>

<div id="onboarding-screen" style="position:fixed;inset:0;background:#0a1628;display:flex;flex-direction:column;z-index:9999;overflow:hidden;">
  <div class="onboarding-orb"></div>
  <div class="ob-header">
    <div class="ob-wordmark">FORGEIQ</div>
    <div class="ob-progress-bar"><div class="ob-progress-fill" id="ob-progress"></div></div>
  </div>

  <!-- PHASE 1: AI CONVERSATION -->
  <div id="phase1-wrap" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div class="ob-messages" id="ob-messages"></div>
    <div class="ob-qr" id="ob-qr"></div>
    <div class="ob-input-bar">
      <input type="text" id="ob-input" placeholder="Type your response..." autocomplete="off">
      <button id="ob-mic" onclick="startVoice()">&#127908;</button>
      <button id="ob-send" onclick="sendP1()">&#10148;</button>
    </div>
  </div>

  <!-- PHASE 2: SMART CHECKLIST -->
  <div id="phase2-wrap" style="flex:1;display:none;flex-direction:column;overflow:hidden;"></div>

  <!-- PHASE 3: PLAN REVEAL -->
  <div id="phase3-wrap" style="flex:1;display:none;flex-direction:column;overflow:hidden;"></div>
</div>

<script>
(function(){
"use strict";

var P1_SYS = 'You are FORGE AI, the coach inside FORGEIQ built by Dr. Michael P. Lovato EdD (NASM CNC/CES/PES, NCSC, GLP-1 specialist, Army Combat Engineer veteran). Conduct a warm coaching intake conversation. Have exactly 3 exchanges. Ask about: 1. What brought them here / their main goal. 2. One specific follow-up based on their answer. 3. Their biggest challenge or what has held them back. After the user third message, write a natural transition sentence then output: PHASE1_COMPLETE:{"summary":"2-3 sentence summary of what you learned"} Rules: Max 3 sentences per message. React genuinely. One question per message. Be direct and warm. After each message add: QUICKREPLIES:["option1","option2","option3","option4"]';

var p1History = [];
var p1Count = 0;
var p1Summary = '';

function checkProfile() {
  var p = {};
  try { p = JSON.parse(localStorage.getItem('forgeiq_profile') || localStorage.getItem('forgeiq_profile_v1') || '{}'); } catch(e) { p = {}; }
  if (p && p.onboardingComplete) {
    window.location.href = '/dashboard';
    return true;
  }
  return false;
}

function init() {
  // Safety: ensure onboarding screen is visible
  var screen = document.getElementById('onboarding-screen');
  if (screen) screen.style.display = 'flex';

  if (checkProfile()) return;
  setTimeout(function() {
    addAI("Hey — I am your FORGE AI coach, built on the expertise of Dr. Michael Lovato. Before I build your plan, I want to understand what actually brought you here. What is going on?",
      ["I want to lose weight","I want to build muscle","I am on GLP-1 medication","I need to get my health back"]);
    p1History.push({role:'assistant', content:"Hey — I am your FORGE AI coach, built on the expertise of Dr. Michael Lovato. Before I build your plan, I want to understand what actually brought you here. What is going on?"});
  }, 600);
}

function addAI(text, qr) {
  var m = document.getElementById('ob-messages');
  if (!m) return;
  var d = document.createElement('div'); d.className = 'msg-ai';
  d.innerHTML = '<div class="msg-ai-bubble">' + text.replace(/\n/g,'<br>') + '</div>';
  m.appendChild(d); m.scrollTop = m.scrollHeight;
  if (qr && qr.length) renderQR(qr);
  setProg(Math.min(30, p1Count * 10));
}

function addUser(text) {
  var m = document.getElementById('ob-messages');
  if (!m) return;
  var d = document.createElement('div'); d.className = 'msg-user';
  d.innerHTML = '<div class="msg-user-bubble">' + text + '</div>';
  m.appendChild(d); m.scrollTop = m.scrollHeight;
  var qr = document.getElementById('ob-qr');
  if (qr) qr.innerHTML = '';
}

function renderQR(opts) {
  var c = document.getElementById('ob-qr');
  if (!c) return;
  c.innerHTML = opts.map(function(o) {
    return '<button class="qr-pill" onclick="sendP1(\'' + o.replace(/'/g,"\\'") + '\')">' + o + '</button>';
  }).join('');
}

function showTyping() {
  var m = document.getElementById('ob-messages');
  if (!m) return;
  var d = document.createElement('div'); d.className = 'msg-ai'; d.id = 'typing-ind';
  d.innerHTML = '<div class="msg-ai-bubble" style="color:#4a6080;font-style:italic;">Coach is thinking...</div>';
  m.appendChild(d); m.scrollTop = m.scrollHeight;
}
function removeTyping() { var e = document.getElementById('typing-ind'); if(e) e.remove(); }

window.sendP1 = function(text) {
  var inp = document.getElementById('ob-input');
  var msg = text || (inp ? inp.value.trim() : '');
  if (!msg) return;
  if (inp) inp.value = '';
  addUser(msg);
  p1History.push({role:'user', content:msg});
  p1Count++;
  showTyping();

  fetch('/.netlify/functions/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:400, system:P1_SYS, messages:p1History})
  })
  .then(function(r) { if (!r.ok) throw new Error('API ' + r.status); return r.json(); })
  .then(function(data) {
    if (!data.content || !data.content[0]) throw new Error('No content');
    var aiText = data.content[0].text;
    removeTyping();

    var qr = [];
    var qrMatch = aiText.match(/QUICKREPLIES:\[([^\]]+)\]/);
    if (qrMatch) { try { qr = JSON.parse('[' + qrMatch[1] + ']'); } catch(e){} aiText = aiText.replace(/QUICKREPLIES:\[[^\]]+\]/,'').trim(); }

    var cMatch = aiText.match(/PHASE1_COMPLETE:(\{[^}]+\})/);
    if (cMatch) {
      try { p1Summary = JSON.parse(cMatch[1]).summary || ''; } catch(e){}
      aiText = aiText.replace(/PHASE1_COMPLETE:[^\n]*/,'').trim();
      p1History.push({role:'assistant', content:aiText});
      addAI(aiText, []);
      setTimeout(function() { goPhase2(); }, 1500);
      return;
    }

    p1History.push({role:'assistant', content:aiText});
    addAI(aiText, qr);
    if (p1Count >= 3) setTimeout(function() { goPhase2(); }, 2000);
  })
  .catch(function(err) {
    removeTyping();
    console.error('Phase 1 error:', err);
    addAI("I got enough to build your plan. Let us get the details right.", []);
    setTimeout(function() { goPhase2(); }, 1500);
  });
};

function goPhase2() {
  var p1 = document.getElementById('phase1-wrap');
  p1.style.transition = 'opacity 0.4s'; p1.style.opacity = '0';
  setTimeout(function() {
    p1.style.display = 'none';
    buildPhase2();
    var p2 = document.getElementById('phase2-wrap');
    p2.style.display = 'flex'; p2.style.opacity = '0'; p2.style.transition = 'opacity 0.4s';
    setTimeout(function() { p2.style.opacity = '1'; }, 50);
  }, 400);
  setProg(33);
}

// Voice
window.startVoice = function() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { alert('Voice not supported in this browser.'); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SR(); rec.lang = 'en-US';
  rec.onresult = function(e) { var t = e.results[0][0].transcript; document.getElementById('ob-input').value = t; sendP1(t); };
  var mic = document.getElementById('ob-mic');
  mic.style.background = 'rgba(230,57,70,0.3)'; mic.style.borderColor = '#e63946';
  rec.onend = function() { mic.style.background=''; mic.style.borderColor=''; };
  rec.start();
};

// Phase 2
function buildPhase2() {
  var wrap = document.getElementById('phase2-wrap');
  wrap.innerHTML =
    '<div style="padding:20px 16px 8px;position:relative;z-index:1;">' +
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.4rem;letter-spacing:0.06em;color:#f0a500;">QUICK DETAILS</div>' +
      '<div style="font-size:0.8rem;color:#8fa3c0;margin-top:2px;">Tap your answers — almost done.</div>' +
    '</div>' +
    '<div id="cl-body" style="flex:1;overflow-y:auto;padding:0 16px 120px;position:relative;z-index:1;">' + buildCLHTML() + '</div>' +
    '<div style="position:fixed;bottom:0;left:0;right:0;padding:16px;background:#0a1628;border-top:1px solid rgba(255,255,255,0.08);z-index:10;">' +
      '<div id="cl-prog-text" style="font-size:0.75rem;color:#8fa3c0;text-align:center;margin-bottom:8px;">Complete all required sections</div>' +
      '<button id="build-plan-btn" onclick="goPhase3()" disabled style="width:100%;padding:16px;background:#4a6080;border:none;border-radius:10px;color:#0a1628;font-family:\'Bebas Neue\',sans-serif;font-size:1.1rem;letter-spacing:0.08em;cursor:not-allowed;transition:all 0.3s;">BUILD MY PLAN &#8594;</button>' +
    '</div>';

  document.querySelectorAll('.cl-pill').forEach(function(p) {
    p.addEventListener('click', function() {
      var sec = this.dataset.section;
      var multi = this.dataset.multi === 'true';
      if (!multi) document.querySelectorAll('[data-section="'+sec+'"]').forEach(function(x) { x.classList.remove('selected'); });
      this.classList.toggle('selected');
      if (sec === 'health') {
        var glp = document.querySelector('[data-section="health"][data-val="glp1"]');
        var medSec = document.getElementById('med-section');
        if (glp && medSec) medSec.style.display = glp.classList.contains('selected') ? 'block' : 'none';
      }
      checkCL();
    });
  });
}

function buildCLHTML() {
  var sections = [
    {id:'experience',label:'YOUR EXPERIENCE LEVEL',req:true,multi:false,pills:[
      {v:'beginner',l:'Just starting'},{v:'under1',l:'Under 1 year'},{v:'1to3',l:'1-3 years'},{v:'3plus',l:'3+ years'},{v:'returning',l:'Coming back'}]},
    {id:'location',label:'WHERE DO YOU TRAIN?',req:true,multi:false,pills:[
      {v:'commercial',l:'Commercial gym'},{v:'small',l:'Small gym'},{v:'home',l:'Home gym'},{v:'none',l:'No equipment'}]},
    {id:'days',label:'DAYS PER WEEK',req:true,multi:false,num:true,pills:[
      {v:'2',l:'2'},{v:'3',l:'3'},{v:'4',l:'4'},{v:'5',l:'5'},{v:'6',l:'6'}]},
    {id:'duration',label:'TIME PER SESSION',req:true,multi:false,pills:[
      {v:'20',l:'20-30 min'},{v:'30',l:'30-45 min'},{v:'45',l:'45-60 min'},{v:'60',l:'60-90 min'}]},
    {id:'health',label:'ANY OF THESE APPLY?',req:false,multi:true,pills:[
      {v:'glp1',l:'GLP-1 medication'},{v:'injury',l:'Managing an injury'},{v:'surgery',l:'Post-surgery'},{v:'heart',l:'Heart condition'},{v:'diabetes',l:'Diabetes'},{v:'pain',l:'Chronic pain'},{v:'none',l:'None of these'}]},
    {id:'supplements',label:'CURRENT SUPPLEMENTS',req:false,multi:true,pills:[
      {v:'protein',l:'Protein powder'},{v:'creatine',l:'Creatine'},{v:'preworkout',l:'Pre-workout'},{v:'vitamins',l:'Vitamins'},{v:'omega3',l:'Omega-3'},{v:'collagen',l:'Collagen'},{v:'none',l:'Nothing yet'}]},
    {id:'nutrition',label:'HOW DO YOU EAT?',req:false,multi:false,pills:[
      {v:'track',l:'I track macros'},{v:'healthy',l:'I try to eat healthy'},{v:'whatever',l:'I eat whatever'},{v:'noidea',l:'No idea — help me'}]}
  ];

  var html = sections.map(function(s) {
    return '<div class="cl-section"><div class="cl-label">' + s.label + (s.req ? ' <span style="color:#f0a500">*</span>' : '') + '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:8px;">' +
      s.pills.map(function(p) { return '<button class="cl-pill' + (s.num ? ' cl-pill-num' : '') + '" data-section="' + s.id + '" data-val="' + p.v + '" data-multi="' + s.multi + '">' + p.l + '</button>'; }).join('') +
      '</div></div>';
  }).join('');

  html += '<div id="med-section" style="display:none;" class="cl-section"><div class="cl-label">WHICH MEDICATION?</div><div style="display:flex;flex-wrap:wrap;gap:8px;">' +
    ['Ozempic','Wegovy','Mounjaro','Zepbound','Rybelsus','Other GLP-1'].map(function(m) { return '<button class="cl-pill" data-section="medication" data-val="' + m.toLowerCase() + '" data-multi="false">' + m + '</button>'; }).join('') + '</div></div>';

  html += '<div class="cl-section"><div class="cl-label">QUICK STRENGTH CHECK</div>' +
    '<div style="margin-bottom:10px;"><div style="font-size:0.75rem;color:#8fa3c0;margin-bottom:6px;">Push-ups</div><div style="display:flex;flex-wrap:wrap;gap:6px;">' +
    ['None yet','Modified only','Full range','20+ reps'].map(function(v) { return '<button class="cl-pill" data-section="pushup" data-val="' + v + '" data-multi="false">' + v + '</button>'; }).join('') + '</div></div>' +
    '<div style="margin-bottom:10px;"><div style="font-size:0.75rem;color:#8fa3c0;margin-bottom:6px;">Pull-ups (unassisted)</div><div style="display:flex;flex-wrap:wrap;gap:6px;">' +
    ['None yet','1-3 reps','4-9 reps','10+ reps'].map(function(v) { return '<button class="cl-pill" data-section="pullup" data-val="' + v + '" data-multi="false">' + v + '</button>'; }).join('') + '</div></div>' +
    '<div><div style="font-size:0.75rem;color:#8fa3c0;margin-bottom:6px;">Bench press vs bodyweight</div><div style="display:flex;flex-wrap:wrap;gap:6px;">' +
    ['Have not benched','Under bodyweight','At bodyweight','Over 1.25x BW'].map(function(v) { return '<button class="cl-pill" data-section="bench" data-val="' + v + '" data-multi="false">' + v + '</button>'; }).join('') + '</div></div></div>';

  return html;
}

function checkCL() {
  var required = ['experience','location','days','duration'];
  var done = required.filter(function(id) { return document.querySelector('[data-section="'+id+'"].selected'); }).length;
  var allDone = done === required.length;
  var btn = document.getElementById('build-plan-btn');
  var txt = document.getElementById('cl-prog-text');
  if (txt) txt.textContent = done + ' of 4 required sections complete';
  if (btn) { btn.disabled = !allDone; btn.style.background = allDone ? '#f0a500' : '#4a6080'; btn.style.cursor = allDone ? 'pointer' : 'not-allowed'; }
}

function getCL(section) { var el = document.querySelector('[data-section="'+section+'"].selected'); return el ? el.dataset.val : ''; }
function getCLMulti(section) { return Array.from(document.querySelectorAll('[data-section="'+section+'"].selected')).map(function(e) { return e.dataset.val; }); }

window.goPhase3 = function() {
  var exp = getCL('experience');
  var optPhase = {beginner:1,under1:1,returning:1,'1to3':2,'3plus':3}[exp] || 1;
  var profileData = {
    experience: exp, location: getCL('location'), daysPerWeek: parseInt(getCL('days')) || 4,
    duration: getCL('duration'), conditions: getCLMulti('health'), medications: getCLMulti('medication'),
    supplements: getCLMulti('supplements'), nutrition: getCL('nutrition'),
    benchmarks: { pushUp: getCL('pushup'), pullUp: getCL('pullup'), benchPress: getCL('bench') },
    optPhase: optPhase, phase1Summary: p1Summary, onboardingComplete: true, completedAt: new Date().toISOString()
  };

  // Save to both profile keys for compatibility
  localStorage.setItem('forgeiq_profile', JSON.stringify(profileData));
  localStorage.setItem('forgeiq_profile_v1', JSON.stringify(profileData));

  var p2 = document.getElementById('phase2-wrap');
  p2.style.transition = 'opacity 0.4s'; p2.style.opacity = '0';
  setTimeout(function() {
    p2.style.display = 'none';
    buildPhase3(profileData);
    var p3 = document.getElementById('phase3-wrap');
    p3.style.display = 'flex'; p3.style.opacity = '0'; p3.style.transition = 'opacity 0.4s';
    setTimeout(function() { p3.style.opacity = '1'; }, 50);
  }, 400);
  setProg(90);
};

// Phase 3
function buildPhase3(data) {
  var phaseNames = {1:'Stabilization Endurance',2:'Strength Endurance',3:'Muscular Development'};
  var splits = {2:'Full Body 2x',3:'Full Body 3x/week',4:'Push / Pull / Legs',5:'5-Day Split',6:'PPL Split'};
  var split = splits[data.daysPerWeek] || 'Custom Split';
  var phase = data.optPhase || 1;
  var glp1 = (data.medications || []).some(function(m) { return ['ozempic','wegovy','mounjaro','zepbound','rybelsus'].indexOf(m) >= 0; });
  var hasInjury = (data.conditions || []).indexOf('injury') >= 0;
  var home = data.location === 'home' || data.location === 'none';
  var exercises = home
    ? [{i:'&#128170;',n:'Push-Up Variations',d:'3 x 12-15'},{i:'&#127947;',n:'DB Romanian DL',d:'3 x 10'},{i:'&#11093;',n:'Plank Series',d:'3 x 45s'}]
    : [{i:'&#127947;',n:'Barbell Squat',d:'4 x 8'},{i:'&#128170;',n:'Bench Press',d:'4 x 8'},{i:'&#128281;',n:'Bent-Over Row',d:'4 x 8'}];

  var wrap = document.getElementById('phase3-wrap');
  wrap.style.padding = '24px 20px';
  wrap.style.overflowY = 'auto';
  wrap.style.position = 'relative';
  wrap.style.zIndex = '1';

  wrap.innerHTML =
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.6rem;letter-spacing:0.06em;color:#e8edf5;margin-bottom:4px;">YOUR TRAINING PLAN IS READY.</div>' +

    '<div style="background:#142444;border:1px solid rgba(240,165,0,0.2);border-radius:12px;padding:20px;margin:16px 0;">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:#f0a500;display:flex;align-items:center;justify-content:center;color:#0a1628;font-size:14px;">&#10003;</div>' +
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;color:#f0a500;font-size:1rem;letter-spacing:0.05em;">OPT PHASE ' + phase + ' — ' + (phaseNames[phase] || 'Stabilization') + '</div>' +
      '</div>' +
      '<div style="font-size:14px;color:#8fa3c0;line-height:1.6;margin-bottom:12px;">Based on everything you shared, your AI coach has calibrated a ' + data.daysPerWeek + '-day training program at Phase ' + phase + '. Your first week focuses on movement quality and building the habit.</div>' +
      '<div style="display:flex;flex-direction:column;gap:6px;">' +
        '<div style="font-size:13px;color:#e8edf5;">&#8226; Train ' + data.daysPerWeek + ' times a week &middot; ' + split + '</div>' +
        '<div style="font-size:13px;color:#e8edf5;">&#8226; Sessions: ' + (data.duration || '45') + ' minutes</div>' +
        '<div style="font-size:13px;color:#e8edf5;">&#8226; Location: ' + (data.location || 'Full gym') + '</div>' +
        (glp1 ? '<div style="font-size:13px;color:#60a5fa;">&#8226; &#128138; GLP-1 muscle preservation protocol active</div>' : '') +
        (hasInjury ? '<div style="font-size:13px;color:#f4a261;">&#8226; &#9888;&#65039; Injury-adaptive programming enabled</div>' : '') +
      '</div>' +
    '</div>' +

    '<div style="margin-bottom:20px;">' +
      '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#4a6080;margin-bottom:10px;">EXERCISE SNEAK PEEK</div>' +
      '<div style="display:flex;gap:10px;">' +
        exercises.map(function(ex) {
          return '<div style="flex:1;background:#142444;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);">' +
            '<div style="height:80px;background:#0e1e36;display:flex;align-items:center;justify-content:center;font-size:2rem;">' + ex.i + '</div>' +
            '<div style="padding:6px 8px;"><div style="font-size:11px;font-weight:600;color:#e8edf5;">' + ex.n + '</div><div style="font-size:10px;color:#8fa3c0;margin-top:2px;">' + ex.d + '</div></div></div>';
        }).join('') +
      '</div>' +
    '</div>' +

    '<button onclick="finishOnboarding()" style="width:100%;padding:18px;background:#f0a500;border:none;border-radius:10px;color:#0a1628;font-family:\'Bebas Neue\',sans-serif;font-size:1.2rem;letter-spacing:0.08em;cursor:pointer;">I WILL NOT QUIT — START NOW</button>' +
    '<div style="text-align:center;font-size:11px;color:#4a6080;margin-top:8px;">No contracts. Cancel anytime. Your coach is ready.</div>';

  setProg(100);
}

window.finishOnboarding = function() {
  document.getElementById('onboarding-screen').style.display = 'none';
  window.location.href = '/dashboard';
};

function setProg(pct) { var el = document.getElementById('ob-progress'); if (el) el.style.width = pct + '%'; }

function safeInit() {
  try {
    init();
    var inp = document.getElementById('ob-input');
    if (inp) inp.addEventListener('keydown', function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendP1();} });
  } catch(err) {
    console.error('Onboarding init error:', err);
    document.body.style.cssText = 'background:#0a1628;color:#e8edf5;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;';
    document.body.innerHTML = '<div style="font-size:2rem;font-weight:900;color:#f0a500;margin-bottom:16px;">FORGEIQ</div><div style="font-size:1.1rem;margin-bottom:32px;">Let\'s build your plan.</div><button onclick="window.location.href=\'/dashboard\'" style="padding:16px 32px;background:#f0a500;border:none;border-radius:10px;color:#0a1628;font-size:1rem;font-weight:700;cursor:pointer;">Get Started &rarr;</button>';
  }
}

// Handle both cases: DOM already ready, or still loading
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', safeInit);
} else {
  safeInit();
}

})();
</script>
</body>
</html>
