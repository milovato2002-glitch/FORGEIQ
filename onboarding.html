<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGEIQ — Meet Your Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a1628; color: #e8edf5; font-family: 'Barlow', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.orb { position: fixed; top: -80px; left: -80px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(240,165,0,0.2) 0%, rgba(45,212,191,0.08) 50%, transparent 70%); animation: pulse 4s ease-in-out infinite; pointer-events: none; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:0.5;} 50%{transform:scale(1.3);opacity:1;} }
.header { padding: 16px 20px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); }
.progress-bar { width: 100%; max-width: 400px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; }
.progress-fill { height: 100%; width: 5%; background: #f0a500; border-radius: 2px; transition: width 0.5s; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.msg-ai { animation: fadeUp 0.3s ease; }
.msg-ai-bubble { background: #142444; border-left: 3px solid #f0a500; border-radius: 4px 12px 12px 4px; padding: 14px 16px; max-width: 88%; font-size: 16px; line-height: 1.5; color: #e8edf5; display: inline-block; }
.msg-user { display: flex; justify-content: flex-end; animation: fadeUp 0.3s ease; }
.msg-user-bubble { background: #f0a500; border-radius: 12px 4px 4px 12px; padding: 12px 16px; max-width: 78%; font-size: 15px; font-weight: 600; color: #0a1628; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.quick-replies { padding: 8px 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.quick-replies::-webkit-scrollbar { display: none; }
.qr-btn { flex-shrink: 0; padding: 10px 18px; border-radius: 24px; border: 1px solid rgba(240,165,0,0.5); background: rgba(240,165,0,0.08); color: #f0a500; font-size: 14px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.qr-btn:hover, .qr-btn:active { background: #f0a500; color: #0a1628; }
.input-bar { padding: 12px 16px; display: flex; gap: 8px; align-items: center; border-top: 1px solid rgba(255,255,255,0.08); }
#user-input { flex: 1; height: 44px; background: #142444; border: 1px solid rgba(255,255,255,0.15); border-radius: 22px; padding: 0 16px; color: #e8edf5; font-size: 16px; outline: none; }
#user-input:focus { border-color: #f0a500; }
#send-btn { width: 44px; height: 44px; border-radius: 50%; background: #f0a500; border: none; color: #0a1628; font-size: 18px; cursor: pointer; }
.typing { color: #4a6080; font-style: italic; font-size: 14px; padding: 8px 0; }
</style>
</head>
<body>

<script>
// Skip onboarding immediately if already completed — before DOM renders
try {
  var _p = JSON.parse(localStorage.getItem('forgeiq_profile_v1') || localStorage.getItem('forgeiq_profile') || '{}');
  if (_p && _p.onboardingComplete) { window.location.replace('/dashboard'); }
} catch(e) {}
</script>

<div class="orb"></div>
<div class="header">
  <div class="logo">FORGEIQ</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>
<div class="messages" id="messages"></div>
<div class="quick-replies" id="quick-replies"></div>
<div class="input-bar">
  <input type="text" id="user-input" placeholder="Type your response..." autocomplete="off">
  <button id="send-btn" onclick="sendMessage()">&#10148;</button>
</div>

<script>
(function() {
"use strict";

var SYSTEM = 'You are FORGE AI, a personal fitness coach built by Dr. Michael P. Lovato EdD (NASM CNC/CES/PES, NCSC, GLP-1 specialist, Army Combat Engineer veteran). Conduct a friendly onboarding conversation to build the user\'s profile. Collect: primary goal, training experience, where they train, health conditions or medications (especially GLP-1), days per week available, session length preference, and basic strength level. Ask 1-2 things per message. Keep messages under 3 sentences. Be warm and specific — react to what they say. After each message add QUICKREPLIES:["option1","option2","option3"]. After 6-8 exchanges when you have enough info, output PROFILE_COMPLETE:{"goals":[],"experience":"","location":"","equipment":"","conditions":[],"medications":[],"daysPerWeek":4,"duration":"45 min","benchmarks":{},"optPhase":1} with real values filled in.';

var history = [];
var exchanges = 0;

function addAI(text, qr) {
  var m = document.getElementById('messages');
  if (!m) return;
  var d = document.createElement('div');
  d.className = 'msg-ai';
  d.innerHTML = '<div class="msg-ai-bubble">' + text.replace(/\n/g,'<br>') + '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
  if (qr && qr.length) {
    var c = document.getElementById('quick-replies');
    if (c) c.innerHTML = qr.map(function(o) { return '<button class="qr-btn" onclick="sendMessage(\'' + o.replace(/'/g,"\\'") + '\')">' + o + '</button>'; }).join('');
  }
  var prog = document.getElementById('progress');
  if (prog) prog.style.width = Math.min(90, exchanges * 12) + '%';
}

function addUser(text) {
  var m = document.getElementById('messages');
  if (!m) return;
  var d = document.createElement('div');
  d.className = 'msg-user';
  d.innerHTML = '<div class="msg-user-bubble">' + text + '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
  var c = document.getElementById('quick-replies');
  if (c) c.innerHTML = '';
}

function showTyping() {
  var m = document.getElementById('messages');
  if (!m) return;
  var d = document.createElement('div');
  d.className = 'msg-ai'; d.id = 'typing';
  d.innerHTML = '<div class="typing">Coach is thinking...</div>';
  m.appendChild(d); m.scrollTop = m.scrollHeight;
}

function removeTyping() { var e = document.getElementById('typing'); if(e) e.remove(); }

window.sendMessage = function(text) {
  var inp = document.getElementById('user-input');
  var msg = text || (inp ? inp.value.trim() : '');
  if (!msg) return;
  if (inp) inp.value = '';
  addUser(msg);
  history.push({role:'user', content:msg});
  exchanges++;
  showTyping();

  fetch('/.netlify/functions/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:500, system:SYSTEM, messages:history})
  })
  .then(function(r) { if (!r.ok) throw new Error('API ' + r.status); return r.json(); })
  .then(function(data) {
    if (!data.content || !data.content[0] || !data.content[0].text) throw new Error('No content');
    var aiText = data.content[0].text;
    removeTyping();

    // Extract quick replies
    var qr = [];
    var qrMatch = aiText.match(/QUICKREPLIES:\[([^\]]+)\]/);
    if (qrMatch) {
      try { qr = JSON.parse('[' + qrMatch[1] + ']'); } catch(e) {}
      aiText = aiText.replace(/QUICKREPLIES:\[[^\]]+\]/, '').trim();
    }

    // Check for profile completion
    var profileMatch = aiText.match(/PROFILE_COMPLETE:(\{[\s\S]*\})/);
    if (profileMatch) {
      try {
        var profile = JSON.parse(profileMatch[1]);
        profile.onboardingComplete = true;
        profile.completedAt = new Date().toISOString();
        localStorage.setItem('forgeiq_profile_v1', JSON.stringify(profile));
        localStorage.setItem('forgeiq_profile', JSON.stringify(profile));
        aiText = aiText.replace(/PROFILE_COMPLETE:[\s\S]*/, '').trim();
        history.push({role:'assistant', content:aiText});
        if (aiText) addAI(aiText, []);
        var prog = document.getElementById('progress');
        if (prog) prog.style.width = '100%';
        setTimeout(function() { showPlanReveal(profile); }, 1500);
        return;
      } catch(e) { console.error('Profile parse error:', e); }
    }

    history.push({role:'assistant', content:aiText});
    addAI(aiText, qr);

    // Safety net: if 10+ exchanges and AI never sent PROFILE_COMPLETE, force finish
    if (exchanges >= 10) {
      setTimeout(function() {
        var fallbackProfile = { goals:['general fitness'], experience:'beginner', location:'commercial', equipment:'full gym', conditions:[], medications:[], daysPerWeek:4, duration:'45 min', benchmarks:{}, optPhase:1, onboardingComplete:true, completedAt:new Date().toISOString() };
        localStorage.setItem('forgeiq_profile_v1', JSON.stringify(fallbackProfile));
        localStorage.setItem('forgeiq_profile', JSON.stringify(fallbackProfile));
        showPlanReveal(fallbackProfile);
      }, 2000);
    }
  })
  .catch(function(err) {
    removeTyping();
    console.error('Chat error:', err);
    addAI("I had a connection issue. Let me try again — what is your main fitness goal?", ["Lose weight","Build muscle","Get healthier","I'm on GLP-1"]);
  });
};

function showPlanReveal(profile) {
  var phaseNames = {1:'Stabilization',2:'Strength Endurance',3:'Hypertrophy',4:'Maximal Strength',5:'Power'};
  var phase = profile.optPhase || 1;
  var glp1 = (profile.medications || []).length > 0;
  var m = document.getElementById('messages');
  if (!m) return;
  var d = document.createElement('div');
  d.className = 'msg-ai';
  d.innerHTML = '<div class="msg-ai-bubble" style="border-color:#2dc653;max-width:95%;width:95%;">' +
    '<div style="font-family:Bebas Neue,sans-serif;font-size:1.3rem;color:#2dc653;letter-spacing:0.05em;">YOUR PLAN IS READY</div>' +
    '<div style="color:#f0a500;font-weight:700;margin:6px 0;">Phase ' + phase + ' — ' + (phaseNames[phase]||'Stabilization') + '</div>' +
    '<div style="color:#8fa3c0;font-size:13px;margin-bottom:12px;">' + (profile.daysPerWeek||4) + ' days/week &middot; ' + (profile.duration||'45 min') + ' sessions</div>' +
    (glp1 ? '<div style="color:#60a5fa;font-size:12px;margin-bottom:8px;">&#128138; GLP-1 protocol active</div>' : '') +
    '<button onclick="startApp()" style="width:100%;padding:14px;background:#f0a500;border:none;border-radius:8px;color:#0a1628;font-family:Bebas Neue,sans-serif;font-size:1.1rem;letter-spacing:0.06em;cursor:pointer;margin-top:4px;">I WILL NOT QUIT — START NOW</button>' +
    '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
  var c = document.getElementById('quick-replies');
  if (c) c.innerHTML = '';
  var bar = document.querySelector('.input-bar');
  if (bar) bar.style.display = 'none';
}

window.startApp = function() {
  window.location.href = '/dashboard';
};

// Boot
function boot() {
  try {
    var inp = document.getElementById('user-input');
    if (inp) inp.addEventListener('keydown', function(e) { if(e.key==='Enter') sendMessage(); });

    setTimeout(function() {
      var opening = "Hey — I'm your FORGE AI coach, built on the expertise of Dr. Michael Lovato. Before I build your plan, I want to understand what actually brought you here. What's going on?";
      addAI(opening, ["I want to lose weight","I want to build muscle","I'm on GLP-1 medication","I need to get healthier"]);
      history.push({role:'assistant', content:opening});
    }, 600);
  } catch(err) {
    console.error('Onboarding boot error:', err);
    document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:#0a1628;color:#e8edf5;font-family:sans-serif;">' +
      '<div style="font-size:2rem;font-weight:900;color:#f0a500;margin-bottom:16px;">FORGEIQ</div>' +
      '<div style="font-size:1.1rem;margin-bottom:32px;">Let\'s build your plan.</div>' +
      '<button onclick="window.location.href=\'/dashboard\'" style="padding:16px 32px;background:#f0a500;border:none;border-radius:10px;color:#0a1628;font-size:1rem;font-weight:700;cursor:pointer;">Get Started &rarr;</button>' +
      '</div>';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
</body>
</html>
