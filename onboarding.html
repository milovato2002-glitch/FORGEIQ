<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGEIQ — Get Started</title>
<script>window.__FORGEIQ_PUBLIC_PAGE__ = true;</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a1628;--bg2:#0e1e36;--card:#142444;--gold:#f0a500;--gold-hover:#ffb820;--gold-dim:rgba(240,165,0,0.12);--t1:#e8edf5;--t2:#8fa3c0;--t3:#4a6080;--border:rgba(255,255,255,0.07);--border-gold:rgba(240,165,0,0.18);--fd:'Bebas Neue',sans-serif;--fc:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--green:#2dc653;--teal:#2dd4bf;--red:#e63946;--amber:#f4a261;}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

.progress-wrap{width:100%;max-width:640px;padding:24px 24px 0;}
.progress-steps{display:flex;gap:4px;}
.progress-step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);transition:background 0.4s;}
.progress-step.active{background:var(--gold);}
.progress-label{text-align:center;margin-top:10px;font-family:var(--fc);font-size:0.72rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t3);}

.step-box{width:100%;max-width:640px;padding:28px 24px;display:none;flex-direction:column;animation:fadeIn 0.35s ease;}
.step-box.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.step-headline{font-family:var(--fd);font-size:clamp(1.5rem,4vw,2rem);letter-spacing:2px;color:var(--t1);text-align:center;margin-bottom:6px;}
.step-sub{text-align:center;font-size:0.85rem;color:var(--t2);margin-bottom:24px;line-height:1.5;}
.step-ack{text-align:center;font-size:0.88rem;color:var(--gold);margin-bottom:20px;font-weight:600;}

/* TAP CARDS */
.tap-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.tap-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all 0.2s;user-select:none;}
.tap-card:hover{border-color:var(--border-gold);}
.tap-card.selected{border-color:var(--gold);background:rgba(240,165,0,0.06);}
.tap-card .card-title{font-family:var(--fc);font-weight:700;font-size:1rem;letter-spacing:0.5px;color:var(--t1);}
.tap-card .card-sub{font-size:0.78rem;color:var(--t2);margin-top:2px;line-height:1.4;}

/* PILL GRID */
.pill-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:10px 18px;cursor:pointer;font-family:var(--fc);font-size:0.88rem;font-weight:600;color:var(--t2);transition:all 0.2s;user-select:none;}
.pill:hover{border-color:var(--border-gold);}
.pill.selected{border-color:var(--gold);background:rgba(240,165,0,0.06);color:var(--gold);}

/* SUPPLEMENT GRID */
.supp-group-label{font-family:var(--fc);font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:16px 0 8px;display:block;}
.supp-group-label:first-child{margin-top:0;}
.supp-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.supp-pill{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;font-family:var(--fb);font-size:0.8rem;color:var(--t2);transition:all 0.2s;user-select:none;}
.supp-pill:hover{border-color:var(--border-gold);}
.supp-pill.selected{border-color:var(--gold);background:rgba(240,165,0,0.06);color:var(--gold);}

/* FORM INPUTS */
.form-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-end;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
.form-group.small{flex:0 0 80px;}
.form-label{font-family:var(--fc);font-size:0.72rem;font-weight:600;letter-spacing:1px;color:var(--t2);text-transform:uppercase;}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--t1);font-family:var(--fb);font-size:0.95rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--t3);}
.form-hint{font-size:0.72rem;color:var(--t3);margin-top:2px;}
.form-link{color:var(--gold);cursor:pointer;text-decoration:underline;}
textarea.form-input{min-height:80px;resize:vertical;}

/* UNIT TOGGLE */
.unit-toggle{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-left:8px;}
.unit-btn{background:transparent;border:none;color:var(--t3);font-family:var(--fc);font-size:0.72rem;font-weight:600;padding:6px 12px;cursor:pointer;transition:all 0.2s;}
.unit-btn.active{background:var(--gold-dim);color:var(--gold);}

/* BODY FAT GUIDE */
.bf-guide{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;display:none;}
.bf-guide.visible{display:block;}
.bf-guide-title{font-family:var(--fc);font-size:0.78rem;font-weight:700;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.bf-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;}
.bf-row:hover{background:rgba(240,165,0,0.04);}
.bf-row.selected{background:rgba(240,165,0,0.08);border:1px solid var(--border-gold);}
.bf-range{font-family:var(--fd);font-size:1.1rem;color:var(--gold);min-width:70px;}
.bf-label{font-family:var(--fc);font-weight:700;font-size:0.88rem;color:var(--t1);}
.bf-desc{font-size:0.75rem;color:var(--t2);}

/* NAVIGATION */
.step-nav{display:flex;gap:12px;margin-top:auto;padding-top:12px;}
.btn-continue{flex:1;background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:14px;font-family:var(--fc);font-weight:700;font-size:0.95rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.btn-continue:hover:not(:disabled){background:var(--gold-hover);transform:translateY(-1px);}
.btn-continue:disabled{opacity:0.4;cursor:not-allowed;}
.btn-back{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:6px;padding:14px 24px;font-family:var(--fc);font-weight:600;font-size:0.95rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.btn-back:hover{border-color:var(--t2);color:var(--t1);}

/* REVEAL CARDS */
.reveal-card{background:var(--card);border:1px solid var(--border-gold);border-radius:12px;padding:24px;margin-bottom:20px;}
.reveal-section{margin-bottom:18px;}
.reveal-section:last-child{margin-bottom:0;}
.reveal-label{font-family:var(--fc);font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.reveal-row{display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--t2);padding:3px 0;}
.reveal-row strong{color:var(--t1);}
.reveal-big{font-family:var(--fd);font-size:2.4rem;color:var(--gold);letter-spacing:1px;line-height:1;}
.reveal-note{font-size:0.78rem;color:var(--t3);margin-top:8px;text-align:center;line-height:1.5;}

/* CALORIE RING */
.cal-ring-wrap{display:flex;align-items:center;gap:24px;margin-bottom:16px;justify-content:center;}
.cal-ring-svg{width:160px;height:160px;transform:rotate(-90deg);}
.cal-ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:12;}
.cal-ring-fill{fill:none;stroke:var(--gold);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease;}
.cal-ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cal-ring-stats{display:flex;flex-direction:column;gap:6px;}
.cal-ring-stat{font-size:0.82rem;color:var(--t2);}
.cal-ring-stat strong{color:var(--t1);}

/* MACRO BARS */
.macro-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.macro-bar-row{display:flex;align-items:center;gap:10px;}
.macro-bar-label{font-family:var(--fc);font-size:0.75rem;font-weight:600;letter-spacing:1px;color:var(--t2);width:60px;text-transform:uppercase;}
.macro-bar-track{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.macro-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.macro-bar-val{font-size:0.75rem;color:var(--t2);width:80px;text-align:right;}

/* SLIDER */
.cal-slider-wrap{text-align:center;margin:12px 0;}
.cal-slider{width:80%;accent-color:var(--gold);}

/* LOADING */
.loading-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.loading-screen.active{display:flex;}
.loading-logo{font-family:var(--fd);font-size:2.8rem;letter-spacing:6px;color:var(--gold);margin-bottom:32px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
.loading-text{font-family:var(--fd);font-size:1.4rem;letter-spacing:2px;color:var(--t1);margin-bottom:12px;}
.loading-sub{font-size:0.95rem;color:var(--t2);max-width:400px;line-height:1.6;}

.ob-wordmark{font-family:var(--fd);font-size:1rem;letter-spacing:4px;color:rgba(255,255,255,0.2);text-align:center;padding-top:28px;}

@media(max-width:480px){
  .form-row{flex-direction:column;}
  .form-group.small{flex:1;}
  .cal-ring-wrap{flex-direction:column;}
}
</style>
</head>
<body>

<script>
try {
  var _p1 = JSON.parse(localStorage.getItem('forgeiq_profile_v1') || '{}');
  var _p2 = JSON.parse(localStorage.getItem('forgeiq_profile') || '{}');
  if ((_p1 && _p1.onboardingComplete === true) || (_p2 && _p2.onboardingComplete === true)) {
    window.location.replace('/dashboard.html');
  }
} catch(e) {}
</script>

<div class="ob-wordmark">FORGEIQ</div>
<div class="progress-wrap">
  <div class="progress-steps" id="prog-bar"></div>
  <div class="progress-label" id="prog-label"></div>
</div>
<div id="steps-container"></div>

<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">FORGEIQ</div>
  <div class="loading-text">DR. LOVATO AI IS BUILDING YOUR PROGRAM...</div>
  <div class="loading-sub">Personalizing for your goals, your history, your reality.</div>
</div>

<script>
(function(){
"use strict";

/* ═══════════════════════════════════════════════════════════
   PROFILE DATA — all answers stored here
   ═══════════════════════════════════════════════════════════ */
var profile = {};

/* ═══════════════════════════════════════════════════════════
   STEP DEFINITIONS
   ═══════════════════════════════════════════════════════════ */
var TOTAL_STEPS = 11;
var currentStep = 1;

/* ═══════════════════════════════════════════════════════════
   CONTEXTUAL ACKNOWLEDGMENTS
   ═══════════════════════════════════════════════════════════ */
function getAck(stepNum){
  if(stepNum <= 1) return "";
  var prev = stepNum - 1;
  if(prev === 1){
    var g = profile.goals || [];
    if(g.length === 0) return "";
    if(g.indexOf("lose_fat") > -1) return "Fat loss and transformation — let's go.";
    if(g.indexOf("build_muscle") > -1) return "Muscle building — time to get strong.";
    if(g.indexOf("recomp") > -1) return "Recomp — the hardest and most rewarding path.";
    if(g.indexOf("glp1") > -1) return "GLP-1 support noted — protein-first at every meal.";
    return "Got it. Let's build your plan.";
  }
  if(prev === 2) return profile.currentWeight ? "Numbers locked in. This is the foundation." : "";
  if(prev === 3){
    var a = profile.activityLevel;
    if(a === "sedentary") return "Sedentary — we'll factor that in.";
    if(a === "very" || a === "extremely") return "High activity — your calorie needs are significant.";
    return "Activity level noted.";
  }
  if(prev === 4) return profile.daysPerWeek ? profile.daysPerWeek + " days a week — we'll make every session count." : "";
  if(prev === 5){
    var c = profile.conditions || [];
    if(c.indexOf("none") > -1 || c.length === 0) return "Clean bill — let's push.";
    var parts = [];
    if(c.indexOf("glp1") > -1) parts.push("GLP-1 noted.");
    if(c.indexOf("injury") > -1 || c.indexOf("surgery") > -1 || c.indexOf("chronic_pain") > -1) parts.push("I'll program around your limitations.");
    if(c.indexOf("veteran") > -1) parts.push("Thank you for your service.");
    return parts.join(" ") || "Noted — your safety comes first.";
  }
  if(prev === 6) return "Got your current nutrition approach.";
  if(prev === 7){
    var r = profile.dietaryRestrictions || [];
    if(r.indexOf("none") > -1 || r.length === 0) return "No restrictions — maximum flexibility.";
    return "Dietary restrictions noted.";
  }
  if(prev === 8) return "I see the challenges. We'll address every one.";
  if(prev === 9) return "Supplement stack noted.";
  return "";
}

/* ═══════════════════════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════════════════════ */
function render(){
  renderProgressBar();
  var container = document.getElementById("steps-container");

  switch(currentStep){
    case 1: renderStep1(container); break;
    case 2: renderStep2(container); break;
    case 3: renderStep3(container); break;
    case 4: renderStep4(container); break;
    case 5: renderStep5(container); break;
    case 6: renderStep6(container); break;
    case 7: renderStep7(container); break;
    case 8: renderStep8(container); break;
    case 9: renderStep9(container); break;
    case 10: renderStep10(container); break;
    case 11: renderStep11(container); break;
  }
}

function renderProgressBar(){
  var bar = document.getElementById("prog-bar");
  bar.innerHTML = "";
  for(var i = 1; i <= TOTAL_STEPS; i++){
    var d = document.createElement("div");
    d.className = "progress-step" + (i <= currentStep ? " active" : "");
    bar.appendChild(d);
  }
  document.getElementById("prog-label").textContent = "STEP " + currentStep + " OF " + TOTAL_STEPS;
}

function esc(s){ return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }

function buildNav(showBack){
  var h = '<div class="step-nav">';
  if(showBack) h += '<button class="btn-back" id="ob-back">BACK</button>';
  h += '<button class="btn-continue" id="ob-next" disabled>CONTINUE</button>';
  h += '</div>';
  return h;
}

function bindBack(){
  var b = document.getElementById("ob-back");
  if(b) b.addEventListener("click", function(){ currentStep--; render(); });
}

function enableNext(){ var n = document.getElementById("ob-next"); if(n) n.disabled = false; }
function disableNext(){ var n = document.getElementById("ob-next"); if(n) n.disabled = true; }

function bindNextClick(fn){
  var n = document.getElementById("ob-next");
  if(n) n.addEventListener("click", function(){ if(fn) fn(); currentStep++; render(); });
}

/* ═══════════════════════════════════════════════════════════
   STEP 1 — PRIMARY GOAL (multi-select)
   ═══════════════════════════════════════════════════════════ */
function renderStep1(c){
  var opts = [
    {v:"lose_fat",t:"Lose weight and burn fat"},
    {v:"build_muscle",t:"Build muscle and get stronger"},
    {v:"recomp",t:"Body recomposition (lose fat AND build muscle)"},
    {v:"performance",t:"Athletic performance"},
    {v:"glp1",t:"GLP-1 medication support"},
    {v:"recover",t:"Recover from injury"},
    {v:"general",t:"General health and energy"},
    {v:"partner",t:"Train with my partner"}
  ];
  var h = '<div class="step-box active">';
  h += '<h1 class="step-headline">WHAT BRINGS YOU HERE?</h1>';
  h += '<div class="step-sub">Select all that apply.</div>';
  h += '<div class="tap-cards" id="goal-cards">';
  opts.forEach(function(o){
    var sel = (profile.goals || []).indexOf(o.v) > -1;
    h += '<div class="tap-card' + (sel ? " selected" : "") + '" data-value="' + o.v + '"><div class="card-title">' + esc(o.t) + '</div></div>';
  });
  h += '</div>';
  h += buildNav(false);
  h += '</div>';
  c.innerHTML = h;

  if((profile.goals || []).length > 0) enableNext();

  document.querySelectorAll("#goal-cards .tap-card").forEach(function(card){
    card.addEventListener("click", function(){
      card.classList.toggle("selected");
      var sel = [];
      document.querySelectorAll("#goal-cards .tap-card.selected").forEach(function(s){ sel.push(s.getAttribute("data-value")); });
      profile.goals = sel;
      if(sel.length > 0) enableNext(); else disableNext();
    });
  });

  bindBack();
  bindNextClick();
}

/* ═══════════════════════════════════════════════════════════
   STEP 2 — BODY STATS
   ═══════════════════════════════════════════════════════════ */
function renderStep2(c){
  var ack = getAck(2);
  var unit = profile._weightUnit || "lbs";
  var h = '<div class="step-box active">';
  h += '<h1 class="step-headline">LET\'S GET YOUR NUMBERS</h1>';
  if(ack) h += '<div class="step-ack">' + esc(ack) + '</div>';
  h += '<div class="step-sub">These calculate your exact calorie and macro targets using the Mifflin-St Jeor formula.</div>';

  // Weight unit toggle
  h += '<div style="text-align:right;margin-bottom:8px;"><span class="form-label" style="margin-right:4px;">UNITS:</span>';
  h += '<div class="unit-toggle" id="unit-toggle">';
  h += '<button class="unit-btn' + (unit === "lbs" ? " active" : "") + '" data-u="lbs">LBS</button>';
  h += '<button class="unit-btn' + (unit === "kg" ? " active" : "") + '" data-u="kg">KG</button>';
  h += '</div></div>';

  var wLabel = unit === "kg" ? "kg" : "lbs";

  h += '<div class="form-row">';
  h += '<div class="form-group"><label class="form-label">Current weight</label><input class="form-input" type="number" id="f-weight" placeholder="180" inputmode="decimal" step="0.1" value="' + (profile.currentWeight || "") + '"><div class="form-hint">' + wLabel + '</div></div>';
  h += '<div class="form-group"><label class="form-label">Goal weight</label><input class="form-input" type="number" id="f-goal-weight" placeholder="175" inputmode="decimal" step="0.1" value="' + (profile.goalWeight || "") + '"><div class="form-hint">Same as current is fine for recomp/performance</div></div>';
  h += '</div>';

  h += '<div class="form-row">';
  h += '<div class="form-group small"><label class="form-label">Height ft</label><input class="form-input" type="number" id="f-hft" placeholder="5" inputmode="numeric" value="' + (profile.heightFt || "") + '"></div>';
  h += '<div class="form-group small"><label class="form-label">Height in</label><input class="form-input" type="number" id="f-hin" placeholder="11" inputmode="numeric" value="' + (profile.heightIn || "") + '"></div>';
  h += '<div class="form-group small"><label class="form-label">Age</label><input class="form-input" type="number" id="f-age" placeholder="35" inputmode="numeric" value="' + (profile.age || "") + '"></div>';
  h += '</div>';

  h += '<div class="form-row"><div class="form-group"><label class="form-label">Gender (affects BMR formula)</label>';
  h += '<div class="pill-grid" id="gender-pills">';
  ["male","female","other"].forEach(function(g){
    var label = g === "other" ? "Prefer not to say" : g.charAt(0).toUpperCase() + g.slice(1);
    h += '<div class="pill' + (profile.gender === g ? " selected" : "") + '" data-value="' + g + '">' + label + '</div>';
  });
  h += '</div>';
  h += '<div class="form-hint">"Prefer not to say" uses the male formula as default</div>';
  h += '</div></div>';

  h += '<div class="form-row">';
  h += '<div class="form-group"><label class="form-label">Body fat % (optional)</label><input class="form-input" type="number" id="f-bf" placeholder="e.g. 18" inputmode="decimal" step="0.1" value="' + (profile.bodyFat || "") + '"><div class="form-hint">Don\'t know yours? <span class="form-link" id="bf-guide-toggle">Tap here to estimate</span></div></div>';
  h += '<div class="form-group"><label class="form-label">Goal body fat % (optional)</label><input class="form-input" type="number" id="f-goal-bf" placeholder="e.g. 15" inputmode="decimal" step="0.1" value="' + (profile.goalBodyFat || "") + '"></div>';
  h += '</div>';

  // Body fat visual guide
  h += '<div class="bf-guide" id="bf-guide">';
  var gender = profile.gender || "male";
  h += '<div class="bf-guide-title" id="bf-guide-title">BODY FAT VISUAL GUIDE — ' + (gender === "female" ? "WOMEN" : "MEN") + '</div>';
  h += '<div id="bf-rows"></div>';
  h += '</div>';

  h += buildNav(true);
  h += '</div>';
  c.innerHTML = h;

  // Build BF guide rows
  buildBFRows();

  // Unit toggle
  document.querySelectorAll("#unit-toggle .unit-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll("#unit-toggle .unit-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      profile._weightUnit = btn.getAttribute("data-u");
    });
  });

  // Gender pills
  document.querySelectorAll("#gender-pills .pill").forEach(function(pill){
    pill.addEventListener("click", function(){
      document.querySelectorAll("#gender-pills .pill").forEach(function(p){ p.classList.remove("selected"); });
      pill.classList.add("selected");
      profile.gender = pill.getAttribute("data-value");
      buildBFRows();
      checkStep2();
    });
  });

  // BF guide toggle
  document.getElementById("bf-guide-toggle").addEventListener("click", function(){
    var guide = document.getElementById("bf-guide");
    guide.classList.toggle("visible");
  });

  // Validation
  ["f-weight","f-goal-weight","f-hft","f-hin","f-age"].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.addEventListener("input", checkStep2);
  });
  checkStep2();

  bindBack();
  bindNextClick(function(){
    var unit = profile._weightUnit || "lbs";

/* ═══════════════════════════════════════════════════════════
   STEP 10 — CALCULATION REVEAL
   ═══════════════════════════════════════════════════════════ */
function calculateNutritionTargets(){
  var weightKg = (profile.currentWeight || 180) * 0.453592;
  var heightCm = ((profile.heightFt || 5) * 30.48) + ((profile.heightIn || 10) * 2.54);
  var age = profile.age || 30;
  var gender = profile.gender || "male";

  // Mifflin-St Jeor BMR
  var bmr;
  if(gender === "female"){
    bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) - 161;
  } else {
    bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) + 5;
  }

  var tdee = Math.round(bmr * (profile.activityMultiplier || 1.55));

  // Determine mode from goals
  var goals = profile.goals || [];
  var isLosing = goals.indexOf("lose_fat") > -1 || goals.indexOf("glp1") > -1;
  var isBuilding = goals.indexOf("build_muscle") > -1 || goals.indexOf("performance") > -1;
  var isRecomp = goals.indexOf("recomp") > -1;

  var nutritionMode, calorieTarget;
  if(isLosing && !isBuilding){
    nutritionMode = "cut";
    calorieTarget = tdee - 400;
  } else if(isBuilding && !isLosing){
    nutritionMode = "build";
    calorieTarget = tdee + 250;
  } else {
    nutritionMode = "recomp";
    calorieTarget = tdee;
  }

  var bw = profile.currentWeight || 180;
  var proteinTarget = nutritionMode === "cut" ? Math.round(bw * 1.4) :
                      nutritionMode === "build" ? Math.round(bw * 1.2) :
                      Math.round(bw * 1.0);
  var fatTarget = Math.round(bw * 0.4);
  var carbTarget = Math.round((calorieTarget - (proteinTarget * 4) - (fatTarget * 9)) / 4);
  if(carbTarget < 50) carbTarget = 50;

  return {
    bmr: Math.round(bmr),
    tdee: tdee,
    calorieTarget: calorieTarget,
    proteinTarget: proteinTarget,
    carbTarget: carbTarget,
    fatTarget: fatTarget,
    nutritionMode: nutritionMode
  };
}

function renderStep10(c){

  profile.proteinTarget = targets.proteinTarget;
  profile.carbTarget = targets.carbTarget;
  profile.fatTarget = targets.fatTarget;

  var modeLabels = {build:"BUILD",cut:"CUT",recomp:"RECOMP"};
  var modeColors = {build:"#2dc653",cut:"#f4a261",recomp:"#2dd4bf"};

  var modeColor = modeColors[targets.nutritionMode] || "#2dd4bf";

  var deficitNote = "";
  if(targets.nutritionMode === "cut") deficitNote = "TDEE " + targets.tdee + " minus 400 cal deficit";

  if(ack) h += '<div class="step-ack">' + esc(ack) + '</div>';
  h += '<div class="step-sub">Calculated using the Mifflin-St Jeor formula — the gold standard used by registered dietitians.</div>';

  h += '<div class="reveal-card">';

  // Mode badge
  h += '<div style="text-align:center;margin-bottom:16px;"><span style="background:' + modeColor + ';color:#0a1628;font-family:var(--fc);font-weight:700;font-size:0.8rem;letter-spacing:2px;padding:6px 20px;border-radius:20px;">' + modeLabel + ' MODE</span></div>';

  // Calories
  h += '<div style="text-align:center;margin-bottom:4px;"><div class="reveal-big" id="cal-display">' + targets.calorieTarget + '</div><div style="font-family:var(--fc);font-size:0.85rem;color:var(--t2);letter-spacing:1px;">CALORIES PER DAY</div>';
  h += '<div style="font-size:0.75rem;color:var(--t3);margin-top:4px;">' + deficitNote + '</div></div>';

  // Macro breakdown
  h += '<div style="display:flex;justify-content:space-around;margin:20px 0;text-align:center;">';
  h += '<div><div style="font-family:var(--fd);font-size:1.8rem;color:var(--gold);" id="prot-display">' + targets.proteinTarget + 'g</div><div style="font-family:var(--fc);font-size:0.72rem;color:var(--t2);letter-spacing:1px;">PROTEIN</div><div style="font-size:0.68rem;color:var(--t3);">' + ppb + 'g/lb</div></div>';
  h += '<div><div style="font-family:var(--fd);font-size:1.8rem;color:var(--teal);" id="carb-display">' + targets.carbTarget + 'g</div><div style="font-family:var(--fc);font-size:0.72rem;color:var(--t2);letter-spacing:1px;">CARBS</div></div>';
  h += '<div><div style="font-family:var(--fd);font-size:1.8rem;color:var(--amber);" id="fat-display">' + targets.fatTarget + 'g</div><div style="font-family:var(--fc);font-size:0.72rem;color:var(--t2);letter-spacing:1px;">FAT</div></div>';
  h += '</div>';

  // BMR/TDEE detail
  h += '<div style="border-top:1px solid var(--border);padding-top:12px;font-size:0.78rem;color:var(--t3);text-align:center;line-height:1.8;">';
  h += 'BMR: ' + targets.bmr + ' cal at complete rest<br>';
  h += 'TDEE: ' + targets.tdee + ' cal for your activity level<br>';
  h += 'Based on: ' + (profile.currentWeight || "—") + ' lbs · ' + (profile.heightFt || "—") + '\'' + (profile.heightIn || "0") + '" · ' + (profile.age || "—") + ' yrs · ' + (profile.activityLevel || "moderate");
  h += '</div>';

  h += '</div>'; // end reveal-card

  // Adjustment slider
  h += '<div class="cal-slider-wrap">';
  h += '<div class="form-label" style="margin-bottom:6px;">WANT TO ADJUST? ±200 CALORIES</div>';
  h += '<input type="range" class="cal-slider" id="cal-slider" min="' + (targets.calorieTarget - 200) + '" max="' + (targets.calorieTarget + 200) + '" value="' + targets.calorieTarget + '" step="25">';
  h += '</div>';

  h += '<div class="step-nav">';
  h += '<button class="btn-back" id="ob-back">BACK</button>';
  h += '<button class="btn-continue" id="ob-next">CONFIRM TARGETS</button>';
  h += '</div>';
  h += '</div>';
  c.innerHTML = h;

  // Slider interaction
  var slider = document.getElementById("cal-slider");
  slider.addEventListener("input", function(){
    var newCal = parseInt(slider.value);
    profile.calorieTarget = newCal;
    document.getElementById("cal-display").textContent = newCal;
    // Recalculate macros with new calories
    var bw = profile.currentWeight || 180;
    var prot = profile.proteinTarget;
    var fat = profile.fatTarget;
    var newCarb = Math.round((newCal - (prot * 4) - (fat * 9)) / 4);
    if(newCarb < 50) newCarb = 50;
    profile.carbTarget = newCarb;
    document.getElementById("carb-display").textContent = newCarb + "g";
  });

  document.getElementById("ob-next").disabled = false;
  bindBack();
  document.getElementById("ob-next").addEventListener("click", function(){
    currentStep++;
    render();
  });
}

/* ═══════════════════════════════════════════════════════════

function renderStep11(c){
  var expLabels = {beginner:"Phase 1 — Stabilization",under1:"Phase 1 — Foundation",
    "1to3":"Phase 2 — Strength Endurance",
    "3plus":"Phase 3 — Muscular Development",
    comeback:"Phase 2 — Rebuild"};
  var phaseLabel = expLabels[profile.experience] || "Phase 1 — Foundation";

  var splitMap = {2:"Full Body x2",3:"Full Body x3",4:"Upper/Lower Split",5:"Push/Pull/Legs + Upper/Lower",6:"Push/Pull/Legs x2"};
  var splitLabel = splitMap[profile.daysPerWeek] || "Full Body";

  var locLabels = {commercial:"Full gym equipment",small:"Small gym",home:"Home gym",bodyweight:"Bodyweight only"};
  var locLabel = locLabels[profile.location] || "";

  var modeLabels = {build:"BUILD",cut:"CUT",recomp:"RECOMP"};
  var modeColors = {build:"#2dc653",cut:"#f4a261",recomp:"#2dd4bf"};
  var modeLabel = modeLabels[profile.nutritionMode] || "RECOMP";
  var modeColor = modeColors[profile.nutritionMode] || "#2dd4bf";

  var goalList = (profile.goals || []).map(function(g){ return goalNames[g] || g; }).join(", ");

  var h = '<div class="step-box active">';
  h += '<h1 class="step-headline">YOUR FORGE PLAN IS READY</h1>';

  h += '<div class="reveal-card">';

  h += '<div class="reveal-section"><div class="reveal-label">TRAINING PLAN</div>';
  h += '<div class="reveal-row"><strong>' + esc(phaseLabel) + '</strong></div>';
  h += '<div class="reveal-row">' + (profile.daysPerWeek || 4) + ' days/week · <strong>' + splitLabel + '</strong></div>';
  h += '<div class="reveal-row">Equipment: <strong>' + esc(locLabel) + '</strong></div>';
  if(profile.injuries) h += '<div class="reveal-row" style="color:var(--amber);">Injury note: <strong>' + esc(profile.injuries) + '</strong></div>';
  h += '<div class="reveal-row">Goals: <strong>' + esc(goalList) + '</strong></div>';
  h += '</div>';

  // Nutrition
  h += '<div class="reveal-section"><div class="reveal-label">NUTRITION PLAN</div>';
  h += '<div class="reveal-row">Mode: <strong style="color:' + modeColor + '">' + modeLabel + '</strong></div>';
  h += '<div class="reveal-row">Daily calories: <strong>' + (profile.calorieTarget || "—") + '</strong></div>';
  h += '<div class="reveal-row">Protein: <strong>' + (profile.proteinTarget || "—") + 'g</strong> · Carbs: <strong>' + (profile.carbTarget || "—") + 'g</strong> · Fat: <strong>' + (profile.fatTarget || "—") + 'g</strong></div>';
  if((profile.conditions || []).indexOf("glp1") > -1) h += '<div class="reveal-row" style="color:var(--amber);">GLP-1 protocol: protein-first every meal, smaller portions, hydration priority</div>';
  h += '</div>';
  h += '</div>'; // end reveal-card

  // AI coach note placeholder
  h += '<div id="coach-note" style="text-align:center;font-size:0.88rem;color:var(--t2);margin-bottom:20px;min-height:24px;"></div>';

  h += '<div class="step-nav">';
  h += '<button class="btn-continue" id="ob-finish" style="font-size:1rem;padding:18px;">I WILL NOT QUIT — START NOW</button>';
  h += '</div>';
  h += '</div>';
  c.innerHTML = h;

  // Fetch AI coach note
  generateCoachNote();

  document.getElementById("ob-finish").addEventListener("click", function(){
    var btn = document.getElementById("ob-finish");
    btn.disabled = true;
    btn.textContent = "BUILDING YOUR PROGRAM...";
    document.getElementById("loading-screen").classList.add("active");
    saveFullProfile();
    setTimeout(function(){ window.location.href = "/dashboard.html"; }, 1500);
  });
}

function generateCoachNote(){
  var noteEl = document.getElementById("coach-note");
  if(!noteEl) return;

  var timer = setTimeout(function(){ noteEl.textContent = ""; }, 6000);

  try {
    fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 80,
        system: "You are FORGE AI. Write one motivational sentence for this athlete. Be specific to their exact situation. Max 20 words. Plain text only.",
        messages: [{role:"user", content: "goal=" + (profile.goals || []).join(",") + ", weight=" + (profile.currentWeight || "") + ", mode=" + (profile.nutritionMode || "") + ", injuries=" + (profile.injuries || "none") + ", supplements=" + ((profile.supplements || []).slice(0,3).join(","))}]
      })
    })
    .then(function(r){ return r.text(); })
    .then(function(text){
      clearTimeout(timer);
      if(text.trim().charAt(0) === "<"){ noteEl.textContent = ""; return; }
      try {
        var data = JSON.parse(text);
        noteEl.textContent = '"' + (data.content && data.content[0] ? data.content[0].text : "") + '"';
      } catch(e){
        if(text.length > 5 && text.length < 200) noteEl.textContent = '"' + text.trim() + '"';
      }
    })
    .catch(function(){ clearTimeout(timer); });
  } catch(e){ clearTimeout(timer); }
}

/* ═══════════════════════════════════════════════════════════
   SAVE FULL PROFILE
   ═══════════════════════════════════════════════════════════ */
function saveFullProfile(){
  var existing = {};
  try { existing = JSON.parse(localStorage.getItem("forgeiq_profile") || "{}"); } catch(e){}
  var existing1 = {};
  try { existing1 = JSON.parse(localStorage.getItem("forgeiq_profile_v1") || "{}"); } catch(e){}

  var profileData = {
    // Step 1
    goals: profile.goals || [],
    // Step 2
    currentWeight: profile.currentWeight,
    goalWeight: profile.goalWeight,
    heightFt: profile.heightFt,
    heightIn: profile.heightIn,
    age: profile.age,
    gender: profile.gender,
    bodyFat: profile.bodyFat,
    goalBodyFat: profile.goalBodyFat,
    // Step 3
    activityLevel: profile.activityLevel,
    activityMultiplier: profile.activityMultiplier,
    // Step 4
    daysPerWeek: profile.daysPerWeek,
    duration: profile.duration,
    experience: profile.experience,
    location: profile.location,
    // Step 5
    conditions: profile.conditions || [],
    injuries: profile.injuries || "",
    medications: profile.medications || [],
    // Step 6
    currentNutritionApproach: profile.currentNutritionApproach,
    // Step 7
    dietaryRestrictions: profile.dietaryRestrictions || [],
    // Step 8
    nutritionChallenges: profile.nutritionChallenges || [],
    // Step 9
    supplements: profile.supplements || [],
    supplementBudget: profile.supplementBudget || "",
    // Step 10 — calculated
    bmr: profile.bmr,
    tdee: profile.tdee,
    calorieTarget: profile.calorieTarget,
    proteinTarget: profile.proteinTarget,
    carbTarget: profile.carbTarget,
    fatTarget: profile.fatTarget,
    nutritionMode: profile.nutritionMode,
    // Meta
    onboardingComplete: true,
    onboardingDate: new Date().toISOString(),
    // Legacy compat
    goal: (profile.goals || [])[0] || "general",
    bodyweight: profile.currentWeight,
    healthContext: profile.conditions || [],
    glp1: (profile.conditions || []).indexOf("glp1") > -1
  };

  // Merge into both profile keys
  var k;
  for(k in profileData){ existing[k] = profileData[k]; }
  localStorage.setItem("forgeiq_profile", JSON.stringify(existing));
  for(k in profileData){ existing1[k] = profileData[k]; }
  localStorage.setItem("forgeiq_profile_v1", JSON.stringify(existing1));

  // Set language and GLP-1 flag
  if(profile.language) localStorage.setItem("forgeiq_lang", profile.language);

  // Store goal weight for progress charts
  if(profile.goalWeight) localStorage.setItem("forgeiq_goal_weight", String(profile.goalWeight));

  // Seed initial weight log entry
  if(profile.currentWeight){
    var today = new Date().toISOString().slice(0,10);
    var weightLog = [];
    try { weightLog = JSON.parse(localStorage.getItem("forgeiq_weight_log") || "[]"); } catch(e){}
    if(weightLog.length === 0){
      weightLog.push({date: today, weight: profile.currentWeight});
      localStorage.setItem("forgeiq_weight_log", JSON.stringify(weightLog));
    }
  }
  if(profile.bodyFat){
    var today2 = new Date().toISOString().slice(0,10);
    var bfLog = [];
    try { bfLog = JSON.parse(localStorage.getItem("forgeiq_bodyfat_log") || "[]"); } catch(e){}
    if(bfLog.length === 0){
      bfLog.push({date: today2, bodyFat: profile.bodyFat});
      localStorage.setItem("forgeiq_bodyfat_log", JSON.stringify(bfLog));
    }
  }
}
